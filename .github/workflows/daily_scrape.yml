name: Daily Siskaperbapo Scraper

on:
  schedule:
    - cron: '0 1 * * *' # Jalan otomatis jam 8 pagi WIB (1 UTC)
  workflow_dispatch: # Biar bisa diklik manual kalau mau ngetes

jobs:
  scrape_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps 

      - name: Run Daily Scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }} 
        run: python src/data/daily_scraper.py