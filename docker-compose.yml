name: marketcast-app

services:
  # MLflow (Tetap dipertahankan untuk MLOps / tracking model)
  mlflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.mlflow
    container_name: marketcast_mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow_data:/mlflow
    environment:
      - MLFLOW_TRACKING_URI=http://localhost:5000
    env_file:
      - .env  # Membaca DATABASE_URL dari file .env
    networks:
      - marketcast_network

  # NANTI: Tambahkan Backend Flask (Tugas Laila/Raja)
  # backend:
  #   build: ./backend
  #   ports:
  #     - "5001:5000"
  #   env_file:
  #     - .env
  #   networks:
  #     - marketcast_network

  # NANTI: Tambahkan Frontend Vue (Tugas Raja/Laila)
  # frontend:
  #   build: ./frontend
  #   ports:
  #     - "8080:80"
  #   networks:
  #     - marketcast_network

# Definisi Network
networks:
  marketcast_network:
    name: marketcast_network
    driver: bridge