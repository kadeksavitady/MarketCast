name: marketcast-app

services:
  # ── 1. MLOps Tracker (MLflow) ───────────────────────────────────────────────
  mlflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.mlflow
    container_name: marketcast_mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow_data:/mlflow
    env_file:
      - .env  # Menggunakan Neon Cloud
    networks:
      - marketcast_network

  # ── 2. Backend FastAPI (Otak Aplikasi) ───────────────────────────────────────
  backend-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: marketcast_api
    ports:
      - "8000:8000"
    volumes:
      # Konsep shared volume dari file baru, tapi diubah ke struktur folder kita
      - ./models:/app/models 
      - ./src/api:/app/src/api
    env_file:
      - .env  # Menggunakan Neon Cloud, TIDAK ADA database lokal!
    networks:
      - marketcast_network
    restart: unless-stopped

  # ── 3. Frontend Streamlit (UI Interaktif) ───────────────────────────────────────────────
  # frontend:
  #   build:
  #     context: .
  #     dockerfile: docker/Dockerfile.frontend
  #   container_name: marketcast_frontend
  #   ports:
  #     - "8501:8501"
  #   environment:
  #     - BACKEND_URL=http://backend-api:8000
  #   depends_on:
  #     - backend-api
  #   networks:
  #     - marketcast_network
  #   restart: unless-stopped

networks:
  marketcast_network:
    name: marketcast_network
    driver: bridge