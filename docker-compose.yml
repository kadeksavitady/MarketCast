name: marketcast-app
services:
  db:
    image: postgres:15
    container_name: marketcast_db_container
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - ./data/postgres_data:/var/lib/postgresql/data

networks:
  default:
    name: marketcast_network